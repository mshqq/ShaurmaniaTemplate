<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Шаурмания</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <nav class="nav">
        <div class="nav__container container">
          <img class="nav__logo" src="img/header/logo.svg" alt="Шаурмания" />
          <div class="nav__controls">
            <p class="nav__number">+7 (914) 123 45-67</p>
            <button class="nav__btn">Заказать звонок</button>
          </div>
        </div>
      </nav>
    </header>
    <main class="main">
      <section class="slider">
        <div class="slider__container container">
          <div class="slider__carousel">
            <button class="slider__prev">
              <img src="img/slider/prev.svg" alt="Назад" />
            </button>
            <img class="slider__img" src="img/slider/1.png" alt="" />
            <button class="slider__next">
              <img src="img/slider/next.svg" alt="Вперед" />
            </button>
          </div>
          <p class="slider__title">Готовим за 3 минуты</p>
          <div class="slider__bubbles">
            <div class="slider__bubble"></div>
            <div class="slider__bubble"></div>
            <div class="slider__bubble active"></div>
            <div class="slider__bubble"></div>
          </div>
        </div>
      </section>
      <section class="features">
        <div class="features__container container">
          <h3 class="features__title">Почему выбирают нас</h3>
          <ul class="features__list">
            <li class="feature">
              <img class="feature__img" src="img/features/🥩.png" alt="" />
              <p class="feature__title">Только свежее мясо</p>
              <p class="feature__subtitle">Маринуем сами каждый день</p>
            </li>
            <li class="feature">
              <img class="feature__img" src="img/features/🌶️.png" alt="" />
              <p class="feature__title">Фирменные соусы</p>
              <p class="feature__subtitle">Собственные рецепты</p>
            </li>
            <li class="feature">
              <img class="feature__img" src="img/features/♨️.png" alt="" />
              <p class="feature__title">Готовим при вас</p>
              <p class="feature__subtitle">Открытая кухня, всё на виду</p>
            </li>
          </ul>
        </div>
      </section>
      <section class="menu">
        <div class="menu__container">
            
        </div>
      </section>
      <section class="about-us"></section>
      <section class="form"></section>
    </main>
    <footer class="footer"></footer>
    <script src="js/main.js"></script>
  </body>
</html>
